<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
      body {
        background-color: #2b2c2f;
      }
      canvas {
        background-color: #2b2c2f;
        width: 100%;
        height: 100%;
      }
      .fitToCenter {
        width: 100%;
        height: 100%;
        display: flex;
        justify-content: center;
        align-items: center;
      }
    </style>
    <link rel="icon" type="image/png"
      href="favicon.png">
    <title>Daily Set</title>
  </head>
    <script type="module">
    import init from './target/daily_set.js'
    init().then(function() {
      document.getElementById("loadingDiv").remove();
      document.getElementsByTagName("canvas")[0].removeAttribute("width");
      document.getElementsByTagName("canvas")[0].removeAttribute("height");
      document.getElementsByTagName("canvas")[0].removeAttribute("style");
      document.getElementsByTagName("canvas")[0].setAttribute("tabindex", 0);
      document.getElementsByTagName("canvas")[0].focus();
    });
  </script>

  <body>
    <div id="loadingDiv" class="fitToCenter">
      <img src="assets/web/loading_320.png" alt="Loading..." width="320" height="160">
    </div>
  </body>
</html>
